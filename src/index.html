<!DOCTYPE html>
<html lang="en">

<head>

  <!-- Basic -->
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Jupiter Investments | Financial Planning & Wealth Management
  </title>

  <!-- SEO -->

  <meta
    name="description"
    content="Jupiter Investments helps individuals and families create, grow and preserve wealth through personalized financial planning, mutual funds, SIPs, insurance, retirement planning, portfolio management and long-term investment solutions."
  />

  <meta
    name="keywords"
    content="Jupiter Investments, Wealth Management, Financial Planning, Investment Advisor, Mutual Funds, SIP, Retirement Planning, Insurance Planning, Portfolio Review, Financial Consultant, India"
  />

  <meta
    name="author"
    content="Jupiter Investments"
  />

  <meta
    name="robots"
    content="index, follow"
  />

  <meta
    name="theme-color"
    content="#6F2DBD"
  />

  <!-- Canonical -->

  <link
    rel="canonical"
    href="https://your-domain.com"
  />

  <!-- Favicons -->

  <link
    rel="icon"
    href="/favicon.ico"
    sizes="any"
  />

  <link
    rel="icon"
    type="image/svg+xml"
    href="/favicon.svg"
  />

  <link
    rel="icon"
    type="image/png"
    sizes="96x96"
    href="/favicon-96x96.png"
  />

  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="/apple-touch-icon.png"
  />

  <link
    rel="manifest"
    href="/site.webmanifest"
  />

  <meta
    property="og:type"
    content="website"
  />

  <meta
    property="og:title"
    content="Jupiter Investments | Secure Your Financial Future"

  <meta
    property="og:image:height"
    content="630"

  <meta
    property="og:image:type"
    content="image/jpeg"

  <meta

  />

  <meta
    property="og:site_name"
    content="Jupiter Investments"

  <meta
    property="og:locale"
    content="en_IN"
